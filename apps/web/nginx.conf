# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Pulse Web (SPA estático + proxy hacia la API)
# Sirve el bundle de Vite y redirige /api/* al servicio "api" del compose.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Carpeta raíz donde nginx:alpine busca los archivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # Cabeceras de seguridad básicas
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Proxy hacia la API ────────────────────────────────────────────────────
    # Todas las peticiones que empiecen con /api/ se redirigen al contenedor
    # "api" (resuelto por la red interna de Docker Compose) en el puerto 3001.
    # Se reescribe la URL quitando el prefijo /api para que la API reciba /health,
    # /auth/..., /tweets/... etc. directamente, sin el prefijo.
    location /api/ {
        proxy_pass http://api:3001/;

        # Cabeceras necesarias para que la API conozca el origen real
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Permitir que las cookies httpOnly viajen correctamente
        proxy_pass_request_headers on;

        # Timeouts razonables
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Para cualquier ruta que no sea un archivo físico, devuelve index.html
    # y deja que React Router maneje el enrutado del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caché de assets estáticos ─────────────────────────────────────────────
    # Los assets de Vite llevan hash en el nombre → se pueden cachear agresivamente
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
